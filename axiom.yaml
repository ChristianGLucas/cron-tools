name: christiangeorgelucas/cron-tools
version: 0.1.1
language: java
description: Composable Axiom crontab-scheduling nodes (validate, next/previous run times, is-due, plain-English description, per-field breakdown, dialect migration) over UNIX/QUARTZ/SPRING53/CRON4J cron syntax, wrapping the Apache-2.0-licensed jmrozanec/cron-utils library. Every reference instant is a caller-supplied RFC 3339 timestamp, never the wall clock, so every node is stateless and deterministic. Distinct from RFC 5545 iCalendar recurrence rules (see recurrence-tools) — this package speaks crontab syntax.
author: Christian George Lucas
license: MIT
tags:
    - cron
    - crontab
    - scheduling
    - quartz
    - job-scheduler
    - datetime
nodes:
    - name: ValidateCron
      input: ValidateCronInput
      output: CronValidationResult
      description: Validate a cron expression against a dialect (UNIX/QUARTZ/SPRING53/CRON4J), e.g. "0 9 * * 1-5" (UNIX) -> valid=true, normalized="0 9 * * 1-5"; "0 9 * * 8" -> valid=false with an INVALID_CRON error naming the out-of-range day-of-week. Never throws on malformed input.
    - name: DescribeCron
      input: DescribeCronInput
      output: CronDescriptionResult
      description: Describe a cron expression in plain English, e.g. "0 9 * * 1-5" (UNIX) -> "at 09:00 AM, Monday through Friday". Supports cron-utils' bundled locales (en, de, el, es, fr, id, it, ja, ko, nl, pl, pt, ro, ru, sw, tr, zh); an unrecognized or empty locale tag falls back to "en". Returns a structured INVALID_CRON error, not a crash, when the expression does not parse for the given dialect.
    - name: FieldBreakdown
      input: FieldBreakdownInput
      output: CronFieldBreakdownResult
      description: Decompose a cron expression into its individual fields, e.g. "*/15 9-17 * * 1-5" (UNIX) -> minute{raw="*/15", kind="every"}, hour{raw="9-17", kind="between"}, day_of_month{raw="*", kind="always"}, month{raw="*", kind="always"}, day_of_week{raw="1-5", kind="between"}. Only the fields the dialect actually has are returned (e.g. QUARTZ/SPRING53 include "second").
    - name: NextRunTimes
      input: CronRunTimesInput
      output: CronRunTimesResult
      description: Compute the next `count` run times of a cron expression strictly after a caller-supplied `from_time`, e.g. "0 9 * * 1-5" (UNIX) from "2026-07-20T00:00:00Z" (a Monday) with count=3 -> ["2026-07-20T09:00:00Z","2026-07-21T09:00:00Z","2026-07-22T09:00:00Z"]. `from_time` is always caller-supplied — this node never reads the wall clock. count is capped at 500 (INVALID_ARGUMENT above that); an expression whose fields can never simultaneously match (e.g. day-of-month=31 in February) returns truncated=true with whatever run times were found before cron-utils' own bounded search gave up.
    - name: PreviousRunTimes
      input: CronRunTimesInput
      output: CronRunTimesResult
      description: Compute the previous `count` run times of a cron expression strictly before a caller-supplied `from_time`, most-recent-first, e.g. "0 9 * * 1-5" (UNIX) from "2026-07-22T00:00:00Z" (a Wednesday) with count=2 -> ["2026-07-21T09:00:00Z","2026-07-20T09:00:00Z"]. Same input contract, bounds, and truncation behaviour as NextRunTimes, walking backward instead of forward.
    - name: IsDue
      input: IsDueInput
      output: CronIsDueResult
      description: Test whether a caller-supplied `check_time` exactly matches an occurrence of a cron expression, e.g. "0 9 * * 1-5" (UNIX) at "2026-07-20T09:00:00Z" (a Monday) -> is_due=true; at "2026-07-20T09:01:00Z" -> is_due=false. `check_time` is always caller-supplied — this node never reads the wall clock, so the same input always produces the same output.
    - name: MigrateCron
      input: MigrateCronInput
      output: CronMigrateResult
      description: Translate a cron expression from one dialect's field layout into another's, e.g. "0 9 * * 1-5" (UNIX) -> "0 0 9 ? * 2-6" (QUARTZ, seconds prepended, day-of-week renumbered 1=Sunday, "?" inserted in day-of-month since day-of-week is explicit). Handles day-of-week renumbering between dialects and the day-of-month/day-of-week "?" disambiguation QUARTZ and SPRING53 require. Returns INVALID_CRON if `cron` does not parse in `from_dialect`, or if the migrated result is not valid in `to_dialect`.
build:
    maven_deps:
        - com.cronutils:cron-utils:9.2.1
